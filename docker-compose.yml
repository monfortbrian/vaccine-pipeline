version: "3.8"

# Backend only.
# Frontend: `next dev` locally, Netlify for staging + production.
#
# Local dev:  docker compose up --build
# CI/prod:    Railway handles deployment — this file is not used in production

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-8001}:8001"
    volumes:
      # Hot reload: mount source so code changes reflect without rebuild
      # Remove this volume in production image builds
      - ./src:/app/src:ro
      - ./api:/app/api:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1    # Flush logs immediately — critical for Railway log visibility
      - PYTHONDONTWRITEBYTECODE=1  # No .pyc files in container
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s     # Give uvicorn time to boot before health checks start

networks:
  default:
    name: kozi-local