version: '3.8'

# Backend only.
# Frontend: `next dev` locally, Netlify for staging and production.
#
# Local dev:  docker compose up --build
# Production: Railway handles deployment - this file is NOT used in production.
#
# Port mapping: host:container both 8000.
# Railway sets PORT at runtime; locally it defaults to 8000 via Dockerfile CMD.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile # must match the actual filename
    ports:
      - '${API_PORT:-8000}:8000' # host:container - change API_PORT in .env if 8000 is taken
    volumes:
      # Mount source for hot reload without rebuilding the image.
      # uvicorn --reload watches these paths inside the container.
      - ./src:/app/src:ro
      - ./api:/app/api:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1 # flush logs immediately - critical for Railway visibility
      - PYTHONDONTWRITEBYTECODE=1 # no .pyc files written inside the container
    command: >
      sh -c "uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s # give uvicorn time to boot before health checks fire

networks:
  default:
    name: kozi-local
