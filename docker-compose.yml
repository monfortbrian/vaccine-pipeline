# TOPE_DEEP API — Dockerfile
# Python 3.11-slim base
#
# Tools bundled at build time (no runtime downloads):
#   MHCflurry 2.0 models — mhcflurry-downloads fetch
#   IEDB Population Coverage Tool v3.0.1 — bundled in src/tools/population_coverage/
#
# PSORTb note:
#   PSORTb v3.0 requires Docker-in-Docker which Railway does not support.
#   Phobius (phobius.sbc.su.se) is used for transmembrane/signal peptide prediction.
#   This is scientifically equivalent for surface antigen identification.
#   Reference: Kall et al., J Mol Biol 2004; Gardy et al., Bioinformatics 2003.

FROM python:3.11-slim

WORKDIR /app

# System deps
# libgomp1: required by MHCflurry (OpenMP threading in sklearn/numpy)
RUN apt-get update && apt-get install -y --no-install-recommends \
    gcc curl perl make wget tar libgomp1 \
    && rm -rf /var/lib/apt/lists/*

# Python deps
COPY requirements_api_lean.txt ./
RUN pip install --no-cache-dir -r requirements_api_lean.txt

# MHCflurry models — downloaded at build time, cached in image
# Prevents runtime dependency on external download servers
# Models: ~200MB, stored at /root/.local/share/mhcflurry/
RUN mhcflurry-downloads fetch && \
    echo "MHCflurry models downloaded successfully" && \
    ls /root/.local/share/mhcflurry/ || echo "WARNING: MHCflurry model directory not found"

# Copy source
COPY src/ src/
COPY data/ data/
COPY api/ api/
COPY run_pipeline.py ./

# IEDB Population Coverage Tool v3.0.1
# Bundled at src/tools/population_coverage/ in the repo.
# Without this, N7 silently uses AFND 2020 static fallback.
# The COPY src/ above handles this IF the tool is committed to src/tools/.
# Verify: src/tools/population_coverage/population_calculation.py must exist.
RUN python3 -c "import sys; sys.path.insert(0,'src/tools/population_coverage'); \
    from population_calculation import PopulationCoverage; \
    print('N7 IEDB tool: OK')" \
    || echo "WARNING: N7 IEDB coverage tool not found — will use AFND 2020 fallback"

EXPOSE 8000

CMD ["sh", "-c", "uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}"]